<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0d0d0d"/>

  <!-- Escudo Club 21 de Septiembre: nested SVG para mantener coords originales -->
  <!-- viewBox = bounding box del escudo original con padding, 65% del tamanio -->
  <svg x="302" y="15" width="420" height="558" viewBox="170 68 684 894">
    <defs>
      <clipPath id="isc">
        <path d="M 512,108 C 492,108 472,115 457,130 C 442,145 423,159 400,163 C 377,167 352,160 329,154 C 298,147 269,156 247,176 L 218,210 L 218,568 C 218,742 512,918 512,918 C 512,918 806,742 806,568 L 806,210 L 777,176 C 755,156 726,147 695,154 C 672,160 647,167 624,163 C 601,159 582,145 567,130 C 552,115 532,108 512,108 Z"/>
      </clipPath>
    </defs>

    <!-- Borde exterior del escudo -->
    <path d="M 512,88 C 490,88 468,96 452,112 C 436,128 415,144 390,148 C 365,152 338,144 314,138 C 280,130 248,140 224,162 L 190,200 L 190,570 C 190,755 512,942 512,942 C 512,942 834,755 834,570 L 834,200 L 800,162 C 776,140 744,130 710,138 C 686,144 659,152 634,148 C 609,144 588,128 572,112 C 556,96 534,88 512,88 Z" fill="#111111"/>

    <!-- Fondo blanco interior -->
    <rect x="170" y="68" width="684" height="894" fill="white" clip-path="url(#isc)"/>

    <!-- Seccion diagonal bordo -->
    <polygon points="218,108 806,108 806,918 218,918 218,660 490,108" fill="#7B1C1C" clip-path="url(#isc)"/>

    <!-- Borde interior del escudo -->
    <path d="M 512,108 C 492,108 472,115 457,130 C 442,145 423,159 400,163 C 377,167 352,160 329,154 C 298,147 269,156 247,176 L 218,210 L 218,568 C 218,742 512,918 512,918 C 512,918 806,742 806,568 L 806,210 L 777,176 C 755,156 726,147 695,154 C 672,160 647,167 624,163 C 601,159 582,145 567,130 C 552,115 532,108 512,108 Z" fill="none" stroke="#111111" stroke-width="8"/>

    <!-- Texto CLUB SOC. Y DEP. 21 de -->
    <text x="640" y="262" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="50" fill="white" text-anchor="middle" letter-spacing="-1">CLUB SOC.</text>
    <text x="660" y="320" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="48" fill="white" text-anchor="middle" letter-spacing="-1">Y DEP.</text>
    <text x="680" y="390" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="52" fill="white" text-anchor="middle">21 de</text>

    <!-- SEPTIEMBRE diagonal -->
    <text transform="rotate(-41, 512, 530)" x="512" y="540" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="74" fill="white" text-anchor="middle" letter-spacing="2">SEPTIEMBRE</text>

    <!-- Camara de video (parte inferior izquierda del escudo) -->
    <g transform="translate(242, 680)">
      <rect x="0" y="8" width="140" height="90" rx="14" fill="#7B1C1C"/>
      <rect x="6" y="14" width="128" height="78" rx="10" fill="#9b2424"/>
      <circle cx="58" cy="53" r="34" fill="#5a1515"/>
      <circle cx="58" cy="53" r="24" fill="#1a0a0a"/>
      <circle cx="58" cy="53" r="16" fill="#2a1a1a"/>
      <circle cx="50" cy="44" r="5" fill="rgba(255,255,255,0.25)"/>
      <circle cx="58" cy="53" r="32" fill="none" stroke="#7B1C1C" stroke-width="3"/>
      <circle cx="118" cy="28" r="13" fill="#cc2222"/>
      <circle cx="118" cy="28" r="8" fill="#ff3333"/>
      <rect x="44" y="-2" width="36" height="14" rx="5" fill="#5a1515"/>
      <polygon points="150,23 150,83 195,53" fill="#7B1C1C"/>
      <polygon points="153,28 153,78 190,53" fill="#9b2424"/>
    </g>

    <!-- Stroke exterior encima de todo -->
    <path d="M 512,88 C 490,88 468,96 452,112 C 436,128 415,144 390,148 C 365,152 338,144 314,138 C 280,130 248,140 224,162 L 190,200 L 190,570 C 190,755 512,942 512,942 C 512,942 834,755 834,570 L 834,200 L 800,162 C 776,140 744,130 710,138 C 686,144 659,152 634,148 C 609,144 588,128 572,112 C 556,96 534,88 512,88 Z" fill="none" stroke="#111111" stroke-width="18"/>
  </svg>

  <!-- Camara standalone debajo del escudo (y=590 a y=770) -->
  <g transform="translate(512, 690)">
    <!-- Cuerpo de la camara -->
    <rect x="-110" y="-50" width="185" height="100" rx="18" fill="#9b2424"/>
    <rect x="-103" y="-43" width="171" height="86" rx="13" fill="#b03030"/>
    <!-- Lente: anillo exterior -->
    <circle cx="-25" cy="0" r="44" fill="#5a1515"/>
    <!-- Lente: vidrio -->
    <circle cx="-25" cy="0" r="32" fill="#0d0d0d"/>
    <circle cx="-25" cy="0" r="20" fill="#1a0707"/>
    <!-- Reflejo del lente -->
    <circle cx="-34" cy="-10" r="7" fill="rgba(255,255,255,0.25)"/>
    <!-- Anillo del lente -->
    <circle cx="-25" cy="0" r="41" fill="none" stroke="#7B1C1C" stroke-width="4"/>
    <!-- Visor (protuberancia arriba) -->
    <rect x="-46" y="-68" width="42" height="18" rx="6" fill="#5a1515"/>
    <!-- Boton de grabacion (punto rojo) -->
    <circle cx="68" cy="-36" r="16" fill="#cc2222"/>
    <circle cx="68" cy="-36" r="10" fill="#ff4444"/>
    <!-- Triangulos de video (lado derecho) -->
    <polygon points="90,-38 90,38 140,0" fill="#7B1C1C"/>
    <polygon points="94,-32 94,32 134,0" fill="#9b2424"/>
  </g>

  <!-- Texto LaPulgaCam al pie -->
  <text x="512" y="920" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle">LaPulgaCam</text>
</svg>
