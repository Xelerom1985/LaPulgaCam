name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;26.1.10909125"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Generate icon PNG from SVG
        run: |
          sudo apt-get install -y -q librsvg2-bin fonts-liberation imagemagick
          convert assets/shield.png \
            -alpha set \
            -fuzz 10% \
            -fill none \
            -draw "color 0,0 floodfill" \
            assets/shield_nobg.png
          cd assets && rsvg-convert -w 1024 -h 1024 icon.svg -o icon.png && cp icon.png android-icon-foreground.png

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore /tmp/lapulga.keystore \
            -alias lapulga \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass lapulga123 -keypass lapulga123 \
            -dname "CN=LaPulgaCam,O=LaPulgaCam,C=AR"

      - name: Build Release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=/tmp/lapulga.keystore \
            -Pandroid.injected.signing.store.password=lapulga123 \
            -Pandroid.injected.signing.key.alias=lapulga \
            -Pandroid.injected.signing.key.password=lapulga123
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LaPulgaCam
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
